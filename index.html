<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <!-- SVG Favicon Integration -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="card">
    <picture>
        <!-- Modern WebP format for fast loading -->
        <source srcset="fugonnet.webp" type="image/webp">
        <!-- Optimized JPG Fallback (The Fuggler Image) -->
        <img src="fuggly.jpg alt="Fuggler" class="fuggly-img" loading="lazy">
    </picture>

    <div class="content">
        <h1>Fuggler Showcase: Old Tooth</h1>
        <p>A "Laboratory Misfit" with a personality only a mother could love. This showcase demonstrates optimized WebP delivery with a compressed JPG fallback for the best performance.</p>
        <a href="#" class="cta-button">Adopt Now</a>
    </div>
</main>

<!-- 
  NOTE FOR SUBMISSION:
  - Compressed Image: assets/images/hero-image.jpg (Optimized for size)
  - WebP Image: assets/images/hero-image.webp (Modern lightweight format)
-->

    <main class="card">
        <picture>
            <!-- High-performance WebP format -->
            <source srcset="fugonnet.webp" type="image/webp">
            <!-- Optimized JPG Fallback -->
            <img src="fuggly.jpg" alt="Fictional Product" class="hero-img" loading="lazy">
        </picture>
    <!-- 
      OPTIMIZATION NOTE:
      - 'hero-image.webp': Converted via Squoosh for maximum compression.
      - 'hero-image.jpg': Compressed via TinyJPG to under 100KB for fast fallback loading.
    -->
</body>
</html>
